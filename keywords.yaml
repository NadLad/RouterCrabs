# ═══════════════════════════════════════════════════════════════
# RouterCrabs — Complexity Scoring Keywords
# ═══════════════════════════════════════════════════════════════
#
# Language-based keyword configuration.
# To add a NEW language: copy the template at the bottom and fill in
# your keywords. Restart RouterCrabs to apply.
# ═══════════════════════════════════════════════════════════════

# ── Code Markers (language-agnostic) ──────────────────────────
# Indicators that source code is present in the prompt.
code_markers:
  - "```"
  - "fn "
  - "pub fn"
  - "async fn"
  - "def "
  - "class "
  - "import "
  - "package "
  - "#include"
  - "impl "
  - "struct "
  - "enum "
  - "trait "
  - "let mut"
  - "const "
  - "var "
  - "function"
  - "export"
  - "require"
  - "SELECT "
  - "INSERT "
  - "UPDATE "
  - "DELETE "

# ═══════════════════════════════════════════════════════════════
# Languages — add your own below
# ═══════════════════════════════════════════════════════════════
# Each language block has:
#   technical_keywords — terms suggesting a complex request
#   question_words     — interrogative markers for open-ended scoring
#
# Keywords are matched case-insensitively against the last user
# message. All languages are merged into one pool at runtime.
# ═══════════════════════════════════════════════════════════════

